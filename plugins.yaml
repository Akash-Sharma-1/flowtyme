# FlowTyme Plugin Configuration
# Edit this file to add, enable, or disable data sources and calendar backends.
# No code changes needed to swap plugins — restart the server after editing.
#
# IMPORTANT: Never put secrets (tokens, passwords) here.
#            Use environment variables in server/.env instead.

sources:
  - id: notion-daily
    type: notion          # maps to NotionSourcePlugin
    enabled: true
    config:
      databaseId: "365201f2eb5f800dac1e000c4f883260"
      dateProperty: "Date"
      # NOTION_TOKEN is read from env var

  # Future: Obsidian vault source (generate adapter with /generate-parser skill)
