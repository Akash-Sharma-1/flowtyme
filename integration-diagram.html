<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlowTyme — Integrations</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #060610;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
}
.wrap { max-width: 980px; width: 100%; }
svg { width: 100%; height: auto; display: block; }

/* ── Flow animations ── */
@keyframes flow-r {
  from { stroke-dashoffset: 60; }
  to   { stroke-dashoffset: 0; }
}
.flow {
  stroke-dasharray: 7 15;
  animation: flow-r 1.8s linear infinite;
}

/* ── Hub rings ── */
@keyframes hub-pulse {
  0%, 100% { opacity: 0.12; }
  50%       { opacity: 0.28; }
}
.hub-glow { animation: hub-pulse 3s ease-in-out infinite; }

/* ── Node rings ── */
@keyframes ring-breathe {
  0%, 100% { opacity: 0.6; }
  50%       { opacity: 1; }
}
.nr { animation: ring-breathe 3.5s ease-in-out infinite; }

/* ── Rotating rings (SVG animateTransform handles this) ── */
</style>
</head>
<body>
<div class="wrap">
<!--
  Layout: 980 × 500
  Left column  x=82  (source nodes, 6 items, y=60..420)
  Hub center       (490, 250)  r=70
  Right column x=898 (calendar nodes, 4 items, y=110..390)

  Bezier source→hub:  M 110 sy  C 290 sy  310 ey  420 ey
  Bezier hub→cal:     M 560 xy  C 690 xy  720 cy  870 cy

  Hub left edge  x≈420, hub right edge x≈560
  Entry y range: 218–282  (hub half-height ±32)
  Exit  y range: 218–282
-->
<svg viewBox="0 0 980 500" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, system-ui, sans-serif" overflow="visible">
<defs>

  <!-- BG -->
  <radialGradient id="bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#131028"/>
    <stop offset="60%"  stop-color="#0a0a1c"/>
    <stop offset="100%" stop-color="#05050e"/>
  </radialGradient>

  <!-- Hub fill -->
  <radialGradient id="hf" cx="38%" cy="28%" r="90%">
    <stop offset="0%"   stop-color="#311b6b"/>
    <stop offset="55%"  stop-color="#1a1045"/>
    <stop offset="100%" stop-color="#0e0b22"/>
  </radialGradient>

  <!-- Hub outer glow -->
  <radialGradient id="hog" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#7c3aed" stop-opacity="1"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>

  <!-- FlowTyme text gradient -->
  <linearGradient id="ftg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#c4b5fd"/>
    <stop offset="100%" stop-color="#7dd3fc"/>
  </linearGradient>

  <!-- Source arc gradient -->
  <linearGradient id="sag" x1="0" y1="0" x2="1" y2="0"
    gradientUnits="userSpaceOnUse" x1="82" y1="0" x2="490" y2="0">
    <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
  </linearGradient>

  <!-- Calendar arc gradient -->
  <linearGradient id="cag" x1="0" y1="0" x2="1" y2="0"
    gradientUnits="userSpaceOnUse" x1="490" y1="0" x2="900" y2="0">
    <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.5"/>
  </linearGradient>

  <!-- Filters -->
  <filter id="f-xxl" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="24"/>
  </filter>
  <filter id="f-xl" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <filter id="f-lg" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="9"/>
  </filter>
  <filter id="f-md" x="-60%"  y="-60%"  width="220%" height="220%">
    <feGaussianBlur stdDeviation="5"/>
  </filter>
  <filter id="f-sm" x="-40%"  y="-40%"  width="180%" height="180%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>

</defs>

<!-- ══════════════════════════════════════════════
     BACKGROUND
     ══════════════════════════════════════════════ -->
<rect width="980" height="500" rx="22" fill="url(#bg)"/>

<!-- Subtle left tint (sources) -->
<rect x="0" y="0" width="240" height="500" rx="22"
  fill="#7c3aed" fill-opacity="0.025"/>
<!-- Subtle right tint (calendars) -->
<rect x="740" y="0" width="240" height="500" rx="22"
  fill="#06b6d4" fill-opacity="0.025"/>

<!-- Center ambient glow -->
<ellipse cx="490" cy="250" rx="260" ry="180"
  fill="url(#hog)" filter="url(#f-xxl)" class="hub-glow"/>

<!-- ══════════════════════════════════════════════
     CONNECTION LINES — SOURCES → HUB
     (source x=82, hub entry x≈420, hub cy=250)
     entry y: evenly spread 218–282 across 6 sources
     source y: 60, 132, 204, 276, 348, 420
     ══════════════════════════════════════════════ -->

<!-- Todoist  sy=60   ey=218  #ef4444 -->
<path d="M 110 60  C 290 60  310 218 420 218"
  fill="none" stroke="#ef4444" stroke-width="1.3" opacity="0.55" class="flow"/>

<!-- Notion   sy=132  ey=231  #94a3b8 -->
<path d="M 110 132 C 290 132 310 231 420 231"
  fill="none" stroke="#94a3b8" stroke-width="1.3" opacity="0.45" class="flow"
  style="animation-delay:.3s"/>

<!-- Linear   sy=204  ey=244  #6366f1 -->
<path d="M 110 204 C 290 204 310 244 420 244"
  fill="none" stroke="#6366f1" stroke-width="1.3" opacity="0.55" class="flow"
  style="animation-delay:.6s"/>

<!-- Obsidian sy=276  ey=257  #8b5cf6 -->
<path d="M 110 276 C 290 276 310 257 420 257"
  fill="none" stroke="#8b5cf6" stroke-width="1.3" opacity="0.55" class="flow"
  style="animation-delay:.9s"/>

<!-- Things 3 sy=348  ey=270  #3b82f6 -->
<path d="M 110 348 C 290 348 310 270 420 270"
  fill="none" stroke="#3b82f6" stroke-width="1.3" opacity="0.45" class="flow"
  style="animation-delay:1.2s"/>

<!-- ClickUp  sy=420  ey=283  #c084fc -->
<path d="M 110 420 C 290 420 310 283 420 283"
  fill="none" stroke="#c084fc" stroke-width="1.3" opacity="0.45" class="flow"
  style="animation-delay:1.5s"/>

<!-- ══════════════════════════════════════════════
     CONNECTION LINES — HUB → CALENDARS
     (hub exit x≈560, cal x=898)
     exit y: evenly spread 218–282 across 4 cals
     cal y:  110, 203, 296, 389
     ══════════════════════════════════════════════ -->

<!-- iCloud   cy=110  xy=218  #ef4444 -->
<path d="M 560 218 C 700 218 730 110 870 110"
  fill="none" stroke="#ef4444" stroke-width="1.3" opacity="0.55" class="flow"
  style="animation-delay:.15s"/>

<!-- Google   cy=203  xy=243  #4285f4 -->
<path d="M 560 243 C 700 243 730 203 870 203"
  fill="none" stroke="#4285f4" stroke-width="1.3" opacity="0.5" class="flow"
  style="animation-delay:.55s"/>

<!-- Outlook  cy=296  xy=258  #60a5fa -->
<path d="M 560 258 C 700 258 730 296 870 296"
  fill="none" stroke="#60a5fa" stroke-width="1.3" opacity="0.5" class="flow"
  style="animation-delay:.95s"/>

<!-- Reminder cy=389  xy=283  #f97316 -->
<path d="M 560 283 C 700 283 730 389 870 389"
  fill="none" stroke="#f97316" stroke-width="1.3" opacity="0.45" class="flow"
  style="animation-delay:1.35s"/>

<!-- ══════════════════════════════════════════════
     FLOWTYME HUB  cx=490 cy=250  r=70
     ══════════════════════════════════════════════ -->

<!-- Outer rotating ring (clockwise, slow) -->
<circle cx="490" cy="250" r="112"
  fill="none" stroke="#6366f1" stroke-width="1"
  stroke-dasharray="7 15" stroke-linecap="round" opacity="0.3">
  <animateTransform attributeName="transform" type="rotate"
    from="0 490 250" to="360 490 250" dur="16s" repeatCount="indefinite"/>
</circle>

<!-- Mid rotating ring (counterclockwise, medium) -->
<circle cx="490" cy="250" r="91"
  fill="none" stroke="#8b5cf6" stroke-width="1"
  stroke-dasharray="3 22" stroke-linecap="round" opacity="0.28">
  <animateTransform attributeName="transform" type="rotate"
    from="0 490 250" to="-360 490 250" dur="10s" repeatCount="indefinite"/>
</circle>

<!-- Orbiting glow dot A (fast, purple) -->
<g>
  <animateTransform attributeName="transform" type="rotate"
    from="0 490 250" to="360 490 250" dur="5s" repeatCount="indefinite"/>
  <circle cx="490" cy="170" r="4" fill="#a78bfa" opacity="0.9" filter="url(#f-sm)"/>
  <circle cx="490" cy="170" r="8" fill="#8b5cf6" opacity="0.25" filter="url(#f-md)"/>
</g>

<!-- Orbiting glow dot B (fast, offset 180°) -->
<g>
  <animateTransform attributeName="transform" type="rotate"
    from="180 490 250" to="540 490 250" dur="5s" repeatCount="indefinite"/>
  <circle cx="490" cy="170" r="3" fill="#67e8f9" opacity="0.7" filter="url(#f-sm)"/>
</g>

<!-- Orbiting dot C (slow, opposite) -->
<g>
  <animateTransform attributeName="transform" type="rotate"
    from="90 490 250" to="-270 490 250" dur="7.5s" repeatCount="indefinite"/>
  <circle cx="490" cy="160" r="2.5" fill="#c4b5fd" opacity="0.6" filter="url(#f-sm)"/>
</g>

<!-- Hub main circle -->
<circle cx="490" cy="250" r="70" fill="url(#hf)"/>

<!-- Hub border -->
<circle cx="490" cy="250" r="70"
  fill="none" stroke="#6d28d9" stroke-width="1.5" opacity="0.85"/>

<!-- Inner highlight arc (glass feel) -->
<path d="M 438 218 A 58 58 0 0 1 542 218"
  fill="none" stroke="white" stroke-width="1" opacity="0.07" stroke-linecap="round"/>

<!-- Neural network pattern inside hub -->
<circle cx="472" cy="234" r="2"   fill="#7c3aed" opacity="0.5"/>
<circle cx="490" cy="228" r="2"   fill="#6366f1" opacity="0.5"/>
<circle cx="508" cy="234" r="2"   fill="#7c3aed" opacity="0.5"/>
<circle cx="464" cy="251" r="1.5" fill="#8b5cf6" opacity="0.35"/>
<circle cx="516" cy="251" r="1.5" fill="#8b5cf6" opacity="0.35"/>
<circle cx="490" cy="258" r="1.5" fill="#6366f1" opacity="0.3"/>
<line x1="472" y1="234" x2="490" y2="228" stroke="#8b5cf6" stroke-width="0.6" opacity="0.25"/>
<line x1="490" y1="228" x2="508" y2="234" stroke="#8b5cf6" stroke-width="0.6" opacity="0.25"/>
<line x1="472" y1="234" x2="464" y2="251" stroke="#7c3aed" stroke-width="0.6" opacity="0.18"/>
<line x1="508" y1="234" x2="516" y2="251" stroke="#7c3aed" stroke-width="0.6" opacity="0.18"/>
<line x1="464" y1="251" x2="490" y2="258" stroke="#6366f1" stroke-width="0.6" opacity="0.15"/>
<line x1="516" y1="251" x2="490" y2="258" stroke="#6366f1" stroke-width="0.6" opacity="0.15"/>

<!-- FlowTyme text -->
<text x="490" y="252" text-anchor="middle" dominant-baseline="central"
  font-size="15.5" font-weight="800" letter-spacing="-0.03em"
  fill="url(#ftg)">FlowTyme</text>

<!-- Sub label -->
<text x="490" y="272" text-anchor="middle"
  font-size="7" fill="#5b5e7e" letter-spacing="0.14em" font-weight="600">AUTO·SCHEDULE</text>

<!-- Three indicator dots -->
<circle cx="479" cy="283" r="2" fill="#8b5cf6" opacity="0.8"/>
<circle cx="490" cy="283" r="2" fill="#6366f1" opacity="0.8"/>
<circle cx="501" cy="283" r="2" fill="#06b6d4" opacity="0.8"/>

<!-- ══════════════════════════════════════════════
     SOURCE NODES — LEFT COLUMN  x=82
     y: 60, 132, 204, 276, 348, 420
     ══════════════════════════════════════════════ -->

<!-- Todoist (82, 60) -->
<g transform="translate(82,60)">
  <circle r="40" fill="#ef4444" opacity="0.1" filter="url(#f-xl)"/>
  <circle r="28" fill="#160c0b"/>
  <circle r="28" fill="none" stroke="#ef4444" stroke-width="1.5" class="nr"/>
  <path d="M-12,1 L-4,10 L14,-8"
    stroke="#ef4444" stroke-width="2.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <text y="42" text-anchor="middle" font-size="9.5" fill="#475569">Todoist</text>
</g>

<!-- Notion (82, 132) -->
<g transform="translate(82,132)">
  <circle r="40" fill="#94a3b8" opacity="0.07" filter="url(#f-xl)"/>
  <circle r="28" fill="#0e0e10"/>
  <circle r="28" fill="none" stroke="#94a3b8" stroke-width="1.5" class="nr"
    style="animation-delay:.4s"/>
  <text text-anchor="middle" dominant-baseline="central"
    font-size="22" font-weight="800" fill="#e2e8f0"
    font-family="Georgia,'Times New Roman',serif">N</text>
  <text y="42" text-anchor="middle" font-size="9.5" fill="#475569">Notion</text>
</g>

<!-- Linear (82, 204) -->
<g transform="translate(82,204)">
  <circle r="40" fill="#6366f1" opacity="0.11" filter="url(#f-xl)"/>
  <circle r="28" fill="#0c0c1c"/>
  <circle r="28" fill="none" stroke="#818cf8" stroke-width="1.5" class="nr"
    style="animation-delay:.8s"/>
  <line x1="-10" y1="-10" x2="10" y2="10" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="-1"  y1="-13" x2="10" y2="0"  stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <text y="42" text-anchor="middle" font-size="9.5" fill="#475569">Linear</text>
</g>

<!-- Obsidian (82, 276) -->
<g transform="translate(82,276)">
  <circle r="40" fill="#8b5cf6" opacity="0.13" filter="url(#f-xl)"/>
  <circle r="28" fill="#110a1e"/>
  <circle r="28" fill="none" stroke="#8b5cf6" stroke-width="1.5" class="nr"
    style="animation-delay:1.2s"/>
  <polygon points="0,-14 13,0 0,14 -13,0" fill="#6d28d9" opacity="0.85"/>
  <polygon points="0,-8  7,0  0,8  -7,0"  fill="#a78bfa"/>
  <text y="42" text-anchor="middle" font-size="9.5" fill="#475569">Obsidian</text>
</g>

<!-- Things 3 (82, 348) -->
<g transform="translate(82,348)">
  <circle r="40" fill="#3b82f6" opacity="0.11" filter="url(#f-xl)"/>
  <circle r="28" fill="#0b0f1e"/>
  <circle r="28" fill="none" stroke="#60a5fa" stroke-width="1.5" class="nr"
    style="animation-delay:1.6s"/>
  <circle r="13" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.55"/>
  <path d="M-6,0 L-2,4.5 L8,-5.5"
    stroke="#60a5fa" stroke-width="2.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <text y="42" text-anchor="middle" font-size="9.5" fill="#475569">Things 3</text>
</g>

<!-- ClickUp (82, 420) -->
<g transform="translate(82,420)">
  <circle r="40" fill="#c084fc" opacity="0.11" filter="url(#f-xl)"/>
  <circle r="28" fill="#130c1e"/>
  <circle r="28" fill="none" stroke="#c084fc" stroke-width="1.5" class="nr"
    style="animation-delay:2s"/>
  <path d="M-12,7 L0,-7 L12,7"
    stroke="#c084fc" stroke-width="2.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <text y="42" text-anchor="middle" font-size="9.5" fill="#475569">ClickUp</text>
</g>

<!-- ══════════════════════════════════════════════
     CALENDAR + REMINDER NODES — RIGHT  x=898
     y: 110, 203, 296, 389
     ══════════════════════════════════════════════ -->

<!-- iCloud Calendar (898, 110) -->
<g transform="translate(898,110)">
  <circle r="36" fill="#ef4444" opacity="0.11" filter="url(#f-xl)"/>
  <circle r="26" fill="#150b0b"/>
  <circle r="26" fill="none" stroke="#f87171" stroke-width="1.5" class="nr"/>
  <rect x="-11" y="-12" width="22" height="18" rx="3.5"
    fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.7"/>
  <line x1="-11" y1="-4" x2="11" y2="-4"
    stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
  <text y="-1" text-anchor="middle" dominant-baseline="central"
    font-size="8.5" font-weight="700" fill="#fca5a5">17</text>
  <text y="39" text-anchor="middle" font-size="9" fill="#475569">iCloud Cal</text>
</g>

<!-- Google Calendar (898, 203) -->
<g transform="translate(898,203)">
  <circle r="36" fill="#4285f4" opacity="0.11" filter="url(#f-xl)"/>
  <circle r="26" fill="#0b0e1a"/>
  <circle r="26" fill="none" stroke="#93c5fd" stroke-width="1.5" class="nr"
    style="animation-delay:.5s"/>
  <!-- Simplified G shape -->
  <path d="M7,0 L7,-10 A12,12 0 1 0 10,7"
    fill="none" stroke="#4285f4" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="0" y1="0" x2="7" y2="0" stroke="#34a853" stroke-width="2.5" stroke-linecap="round"/>
  <text y="39" text-anchor="middle" font-size="9" fill="#475569">Google Cal</text>
</g>

<!-- Outlook (898, 296) -->
<g transform="translate(898,296)">
  <circle r="36" fill="#0078d4" opacity="0.11" filter="url(#f-xl)"/>
  <circle r="26" fill="#0a0e1a"/>
  <circle r="26" fill="none" stroke="#60a5fa" stroke-width="1.5" class="nr"
    style="animation-delay:1s"/>
  <rect x="-12" y="-10" width="24" height="18" rx="4"
    fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
  <path d="M-12,-10 L0,1 L12,-10"
    fill="none" stroke="#60a5fa" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <text y="39" text-anchor="middle" font-size="9" fill="#475569">Outlook</text>
</g>

<!-- Apple Reminders (898, 389) -->
<g transform="translate(898,389)">
  <circle r="36" fill="#f97316" opacity="0.11" filter="url(#f-xl)"/>
  <circle r="26" fill="#15100a"/>
  <circle r="26" fill="none" stroke="#fb923c" stroke-width="1.5" class="nr"
    style="animation-delay:1.5s"/>
  <!-- Checklist -->
  <circle cx="-10" cy="-8"  r="2.8" fill="#fb923c"/>
  <line x1="-4" y1="-8"  x2="12" y2="-8"  stroke="#fb923c" stroke-width="2" stroke-linecap="round"/>
  <circle cx="-10" cy="0"   r="2.8" fill="#fb923c" opacity="0.6"/>
  <line x1="-4" y1="0"   x2="8"  y2="0"   stroke="#fb923c" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="-10" cy="8"   r="2.8" fill="#fb923c" opacity="0.3"/>
  <line x1="-4" y1="8"   x2="12" y2="8"   stroke="#fb923c" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <text y="39" text-anchor="middle" font-size="9" fill="#475569">Reminders</text>
</g>

<!-- ══════════════════════════════════════════════
     COLUMN LABELS
     ══════════════════════════════════════════════ -->

<!-- Left: Task Sources -->
<text x="82" y="16" text-anchor="middle"
  font-size="8.5" font-weight="700" letter-spacing="0.14em"
  fill="#7c3aed" opacity="0.85">TASK SOURCES</text>

<!-- Right: Calendars & Reminders -->
<text x="898" y="58" text-anchor="middle"
  font-size="8.5" font-weight="700" letter-spacing="0.14em"
  fill="#0e7490" opacity="0.85">CALENDARS &amp;</text>
<text x="898" y="70" text-anchor="middle"
  font-size="8.5" font-weight="700" letter-spacing="0.14em"
  fill="#0e7490" opacity="0.85">REMINDERS</text>

</svg>
</div>
</body>
</html>
