<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var saved = localStorage.getItem('flowtyme.theme');
        var theme;
        if (saved === 'light' || saved === 'dark') {
          theme = saved;
        } else {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowTyme — Time Boxing Assistant</title>
    <meta name="description" content="Plugin-based time-boxing assistant. Connect any task source and calendar, get a structured day automatically." />
    <meta name="theme-color" content="#863bff" />
    <meta property="og:title" content="FlowTyme — Time Boxing Assistant" />
    <meta property="og:description" content="Plugin-based time-boxing assistant. Any task source + any calendar → structured day, automatically." />
    <meta property="og:image" content="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
