  #   type: markdown-file
  #   enabled: false
  #   config:
  #     filePath: "~/tasks.md"

calendars:
  - id: icloud-primary
    type: icloud          # maps to ICloudCalendarPlugin
    enabled: true
    config: {}
    # ICLOUD_USERNAME + ICLOUD_APP_PASSWORD are read from env vars

